name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-6"
          track_progress: "true"
          include_fix_links: "false"
          additional_permissions: |
            actions: read
          prompt: |
            When asked to "review" a PR, perform a thorough code review following
            the project's REVIEW.md checklist. Read REVIEW.md from the repository
            root first, then review every changed file against each applicable section.

            Post your findings as inline PR review comments on the specific lines
            where issues are found. Use GitHub's review API to submit a single review
            with all comments (not individual comments).

            Classify each finding:
            - Request changes: security issues, validation gaps, missing serde attributes, broken is_empty() methods
            - Comment: style violations, missing tests, documentation gaps, test boilerplate concerns
            - Approve: if no issues found

            Pay special attention to the "Serde correctness" and "Validation coverage"
            sections in REVIEW.md — these catch the class of bugs where new config
            fields silently break serialization or bypass validation.

            When reviewing, also check CI status — if clippy or tests failed,
            include the failures in your review.

            For general "@claude" mentions (not "review"), respond normally.
